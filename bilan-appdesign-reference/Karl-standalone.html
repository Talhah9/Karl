  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

t-face {\n  font-family: 'Space Mono';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"f3421088-e551-48a9-b793-fafe5a305421\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Space Mono';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"90954f7f-93a6-4d68-9022-46774786eda1\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n:root{\n --bg:#12100f;--surf:#1d1a17;--surf2:#272219;--surf3:#322b21;--line:rgba(255,255,255,.09);\n --lime:#c4f542;--purple:#a78bfa;--text:#f6f3ee;--muted:#9a9288;--warm:#ff7a4d;\n}\n*{box-sizing:border-box}\nbody{margin:0;font-family:'Sora',system-ui,sans-serif;color:var(--text);\n background:radial-gradient(1100px 700px at 12% -5%,rgba(196,245,66,.10),transparent 55%),radial-gradient(1000px 800px at 92% 8%,rgba(167,139,250,.12),transparent 55%),#0a0908;}\n.wrap{padding:60px 52px 110px;margin:0 auto;max-width:1680px}\n/* masthead */\n.mh{display:flex;align-items:center;gap:22px;margin-bottom:12px}\n.mh-word{font-size:56px;font-weight:800;letter-spacing:-.04em;line-height:.9}\n.mh-sub{max-width:640px;color:var(--muted);font-size:17px;line-height:1.5;margin:6px 0 0}\n.mh-sub b{color:var(--text);font-weight:600}\n.kbrand{color:var(--lime)}\n/* legend */\n.legend{display:flex;flex-wrap:wrap;gap:14px;margin:34px 0 50px}\n.lcard{background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:20px;padding:18px 20px}\n.llabel{font-family:'Space Mono',monospace;text-transform:uppercase;letter-spacing:.12em;font-size:10px;color:var(--muted);margin:0 0 13px}\n.sw{display:flex;gap:10px;align-items:center}\n.chip{display:flex;flex-direction:column;gap:6px;align-items:center;font-family:'Space Mono',monospace;font-size:9px;color:var(--muted)}\n.dot{width:38px;height:38px;border-radius:12px;border:1px solid rgba(255,255,255,.14)}\n.typerow{display:flex;align-items:baseline;gap:14px}\n/* groups */\n.group{margin:0 0 66px}\n.ghd{display:flex;align-items:baseline;gap:14px;margin:0 0 24px;flex-wrap:wrap}\n.gnum{font-family:'Space Mono',monospace;font-size:11px;font-weight:700;color:#111;background:var(--lime);padding:4px 9px;border-radius:7px}\n.gname{font-size:22px;font-weight:700;letter-spacing:-.02em}\n.gdesc{color:var(--muted);font-size:14px;max-width:520px}\n.grow{display:flex;flex-wrap:wrap;gap:40px;align-items:flex-start}\n.cap{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.06em;color:var(--muted);text-transform:uppercase;margin:14px 2px 0}\n.phonewrap{display:flex;flex-direction:column}\n/* iPhone */\n.phone{width:308px;background:#050505;border-radius:46px;padding:9px;flex:none;\n box-shadow:0 50px 90px -30px rgba(0,0,0,.85),0 0 0 1px rgba(255,255,255,.07),inset 0 0 0 2px #1a1a1a}\n.screen{width:290px;height:628px;background:var(--bg);border-radius:38px;overflow:hidden;position:relative;display:flex;flex-direction:column}\n.island{position:absolute;top:11px;left:50%;transform:translateX(-50%);width:88px;height:25px;background:#000;border-radius:14px;z-index:40}\n.statusbar{height:48px;flex:none;display:flex;align-items:center;justify-content:space-between;padding:8px 24px 0 26px;font-size:13.5px;font-weight:600}\n.sbr{display:flex;align-items:center;gap:6px}\n.bat{width:22px;height:11px;border:1.4px solid var(--text);border-radius:3px;position:relative;opacity:.9}\n.bat::after{content:'';position:absolute;top:1.4px;bottom:1.4px;left:1.4px;width:12px;background:var(--text);border-radius:1px}\n.homebar{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);width:118px;height:5px;border-radius:3px;background:rgba(255,255,255,.32);z-index:40}\n.body{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}\n.scroll{flex:1;overflow-y:auto;overflow-x:hidden}\n.scroll::-webkit-scrollbar{display:none}\n.pad{padding-left:20px;padding-right:20px}\n/* utils */\n.col{display:flex;flex-direction:column}\n.row{display:flex;align-items:center}\n.between{display:flex;align-items:center;justify-content:space-between}\n.wrap-r{flex-wrap:wrap}\n.mono{font-family:'Space Mono',monospace;text-transform:uppercase;letter-spacing:.09em}\n.muted{color:var(--muted)}\n.lime{color:var(--lime)}.warm{color:var(--warm)}.purp{color:var(--purple)}\n.big{font-weight:800;letter-spacing:-.035em;line-height:.95}\n.divider{height:1px;background:var(--line)}\n/* mascotte Karl */\n.karl{width:46px;height:46px;background:var(--lime);border-radius:44% 44% 47% 47%/47% 47% 43% 43%;position:relative;flex:none;box-shadow:0 6px 18px -6px rgba(196,245,66,.5)}\n.karl::before,.karl::after{content:'';position:absolute;top:34%;width:13%;height:22%;background:#141210;border-radius:44%}\n.karl::before{left:27%}.karl::after{right:27%}\n.karl .brow{position:absolute;top:24%;left:22%;right:22%;height:8%;border-radius:4px;background:#141210;opacity:0;transform:rotate(-6deg)}\n.karl.smug::after{height:14%;top:38%}\n/* buttons */\n.btn{display:flex;align-items:center;justify-content:center;gap:8px;height:52px;border-radius:26px;background:var(--lime);color:#141210;font-weight:700;font-size:15px;border:none;cursor:pointer;width:100%}\n.btn.ghost{background:transparent;border:1.5px solid var(--line);color:var(--text)}\n.btn.dark{background:var(--surf2);color:var(--text)}\n.pill{display:inline-flex;align-items:center;gap:6px;padding:8px 13px;border-radius:16px;background:var(--surf2);border:1px solid var(--line);font-size:12px;color:var(--text)}\n.tag{display:inline-flex;align-items:center;gap:5px;font-family:'Space Mono',monospace;text-transform:uppercase;letter-spacing:.08em;font-size:9.5px;padding:4px 8px;border-radius:7px}\n.tag.lime{background:rgba(196,245,66,.15);color:var(--lime)}\n.tag.warm{background:rgba(255,122,77,.16);color:var(--warm)}\n.tag.pur{background:rgba(167,139,250,.16);color:var(--purple)}\n.tag.mut{background:var(--surf2);color:var(--muted)}\n/* cards */\n.card{background:var(--surf);border:1px solid var(--line);border-radius:22px;padding:18px}\n.card.hi{background:linear-gradient(160deg,#e6ff6b,#c4f542);color:#141210;border:none}\n.card.pur{background:linear-gradient(160deg,rgba(167,139,250,.18),rgba(167,139,250,.06));border:1px solid rgba(167,139,250,.28)}\n/* gauge ring */\n.ring{width:112px;height:112px;border-radius:50%;display:grid;place-items:center;flex:none}\n.ring-in{width:84px;height:84px;border-radius:50%;background:var(--surf);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px}\n/* progress bar */\n.bar{height:9px;border-radius:6px;background:rgba(255,255,255,.10);overflow:hidden}\n.bar>i{display:block;height:100%;border-radius:6px;background:var(--lime)}\n/* segmented */\n.seg{display:flex;background:var(--surf);border:1px solid var(--line);border-radius:15px;padding:4px;gap:4px}\n.seg>span{flex:1;text-align:center;padding:9px 0;border-radius:11px;font-size:13px;font-weight:600;color:var(--muted)}\n.seg>span.on{background:var(--lime);color:#141210}\n/* fields */\n.field{background:var(--surf);border:1px solid var(--line);border-radius:15px;padding:13px 15px;display:flex;align-items:center;justify-content:space-between}\n.field .lab{font-size:12px;color:var(--muted)}\n.field .val{font-size:14px;font-weight:600}\n/* toggle */\n.tgl{width:42px;height:25px;border-radius:13px;background:var(--surf3);position:relative;flex:none}\n.tgl.on{background:var(--lime)}\n.tgl::after{content:'';position:absolute;top:2.5px;left:2.5px;width:20px;height:20px;border-radius:50%;background:#fff}\n.tgl.on::after{left:19.5px}\n/* chat bubbles */\n.bk{align-self:flex-start;max-width:82%;background:var(--surf2);border-radius
